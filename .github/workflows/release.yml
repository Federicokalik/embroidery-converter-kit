name: Release desktop + CLI

# Tag a version to build and publish everything:
#   git tag v0.1.0 && git push origin v0.1.0
# Artifacts get stable names, so the site's
# /releases/latest/download/<name> links always serve the newest release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: apps/desktop/release/Ricuci-Windows.exe
          - os: macos-latest
            asset: apps/desktop/release/Ricuci-macOS.dmg
          - os: ubuntu-latest
            asset: apps/desktop/release/Ricuci-Linux.AppImage
    runs-on: ${{ matrix.os }}
    env:
      # Windows and macOS ship unsigned for now (no certs in CI); Linux gets a
      # GPG signature below. To turn macOS signing on later: add a Developer ID
      # cert + APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID secrets and
      # stop forcing this off on the macOS row (package.json already carries the
      # hardened-runtime + entitlements config).
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The tag is the source of truth for the app version: the in-app
      # update notifier compares app.getVersion() with the latest release.
      - run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: apps/desktop
        shell: bash

      # Desktop bundles the app-shell renderer (RICUCI_TARGET=desktop): no
      # marketing landing, no sponsor, no SEO — see astro.config.desktop.mjs.
      - run: pnpm --filter web build:desktop
      - run: pnpm --filter desktop sync-renderer
      - run: pnpm --filter desktop dist

      # Linux: GPG-sign a SHA256SUMS of the AppImage so users can verify the
      # download. Skips gracefully until the GPG_PRIVATE_KEY secret is set.
      - name: Sign the Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/desktop/release
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo 'GPG_PRIVATE_KEY not set — shipping the AppImage unsigned.'
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          sha256sum Ricuci-Linux.AppImage > SHA256SUMS
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

      # SHA256SUMS + .asc only exist when the GPG secret is set; missing files
      # are skipped (fail_on_unmatched_files defaults to false).
      - name: Attach Linux checksums + signature
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/SHA256SUMS
            apps/desktop/release/SHA256SUMS.asc

  cli:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # bun bundles @embroidery/core straight from TS source, but the
      # workspace symlinks come from pnpm install.
      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2

      - name: Compile embconv (linux + macOS)
        run: |
          bun build --compile --minify packages/cli/src/index.ts \
            --target=bun-linux-x64 --outfile out/embconv-linux-x64
          bun build --compile --minify packages/cli/src/index.ts \
            --target=bun-darwin-arm64 --outfile out/embconv-macos-arm64
          bun build --compile --minify packages/cli/src/index.ts \
            --target=bun-darwin-x64 --outfile out/embconv-macos-x64

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*

  # bun refuses --windows-icon when cross-compiling, so the Windows CLI
  # builds on a Windows runner to keep the branded icon.
  cli-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2

      - name: Compile embconv for Windows (with icon)
        run: >
          bun build --compile --minify packages/cli/src/index.ts
          --windows-icon=apps/desktop/build/icon.ico
          --outfile out/embconv-windows-x64.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: out/embconv-windows-x64.exe

  # Publish the `ricuci` package to npm (npx ricuci …). Zero runtime deps:
  # tsup bundles @embroidery/core into a single self-contained file. Needs
  # the NPM_TOKEN secret (an npm automation token); id-token: write lets npm
  # attach a provenance attestation (repo is public).
  npm:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The tag is the source of truth for the version.
      - run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: packages/cli

      # Bundle, then ship the license texts inside the tarball.
      - run: pnpm --filter ricuci build
      - run: cp LICENSE NOTICE packages/cli/

      - run: pnpm publish --no-git-checks --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
